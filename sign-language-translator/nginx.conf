server {
    listen 80;

    # Allow SharedArrayBuffer (required by MediaPipe WASM)
    # credentialless allows cross-origin media (videos from backend) unlike require-corp
    add_header Cross-Origin-Opener-Policy "same-origin";
    add_header Cross-Origin-Embedder-Policy "credentialless";

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
